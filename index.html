<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTI Elevadores</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form action="#">

        <div class="cabecalho">
            <img src="/Acets/LTI logo.png" alt="logo-lti-elevadores" class="logo">
        </div>

        <div class="secao-cliente">
            <h3>Dados do Cliente:</h3>
            <label for="cnpjContratante">CPF/CNPJ:</label>
            <input type="text" id="cnpjContratante" maxlength="18" placeholder="Digite apenas números"
                name="cnpjContratante">

            <label for="contratante">Nome do Cliente:</label>
            <input type="text" id="contratante" name="contratante" placeholder="Digite o nome do cliente">

            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" placeholder="Digite o endereço do cliente">

            <label for="numero">Numero:</label>
            <input type="text" id="numero" name="numero" placeholder="Digite o número">

            <label for="cep">CEP:</label>
            <input type="text" id="cep" name="cep" maxlength="10" placeholder="Digite apenas os números">
        </div>

        <div class="secao-equipamentos">
            <h3>Informações dos Equipamentos:</h3>
            
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px;">
                
                <div>
                    <label for="eqpQuantidade">Quantidade:</label>
                    <select id="eqpQuantidade" style="width: 100%; box-sizing: border-box;">
                        <option value="">Nº</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div>
                    <label for="eqpEquipamento">Equipamento:</label>
                    <select id="eqpEquipamento" style="width: 100%; box-sizing: border-box;">
                        <option value="">Selecione...</option>
                        <option value="Elevador">Elevador</option>
                        <option value="Escada">Escada</option>
                        <option value="Esteira">Esteira</option>
                        <option value="Plataforma">Plataforma</option>
                    </select>
                </div>

                <div>
                    <label for="eqpMarca">Marca:</label>
                    <select id="eqpMarca" style="width: 100%; box-sizing: border-box;">
                        <option value="">Selecione...</option>
                        <option value="Thyssenkrupp">Thyssenkrupp / TKE</option>
                        <option value="Atlas Schindler">Atlas Schindler</option>
                        <option value="Otis">Otis</option>
                        <option value="Castelo">Castelo</option>
                        <option value="Boxtop">Boxtop</option>
                        <option value="Outras">Outras</option>
                    </select>
                </div>

                <div>
                    <label for="eqpTipo">Tipo:</label>
                    <select id="eqpTipo" style="width: 100%; box-sizing: border-box;">
                        <option value="">Selecione...</option>
                        <option value="Passageiro">Passageiro</option>
                        <option value="Carga">Carga</option>
                        <option value="Maca/Leito">Maca/Leito</option>
                        <option value="Acessibilidade">Acessibilidade</option>
                        <option value="Monta-Carga">Monta-Carga</option>
                    </select>
                </div>

                <div>
                    <label for="eqpParadas">Paradas:</label>
                    <select id="eqpParadas" style="width: 100%; box-sizing: border-box;">
                        <option value="">Nº</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">10</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                    </select>
                </div>

            </div>

            <button type="button" id="btnAdicionarEquipamento" style="width: 100%; background-color: #007BFF; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-weight: bold;">
                + Adicionar Equipamento
            </button>

            <table style="width: 100%; border-collapse: collapse; text-align: center; border: 1px solid #ccc; table-layout: fixed;">
                <thead>
                    <tr style="background-color: #f8f9fa; border-bottom: 2px solid #ccc; font-size: 14px;">
                        <th style="padding: 10px; border-right: 1px solid #ccc; width: 30%;">EQUIPAMENTOS</th>
                        <th style="padding: 10px; border-right: 1px solid #ccc; width: 20%;">MARCA</th>
                        <th style="padding: 10px; border-right: 1px solid #ccc; width: 20%;">TIPO</th>
                        <th style="padding: 10px; border-right: 1px solid #ccc; width: 15%;">PARADAS</th>
                        <th style="padding: 10px; width: 15%;">AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="lista-equipamentos-body">
                    </tbody>
            </table>
        </div>
        <div class="secao-financeiro">
            <h3>Dados financeiro:</h3>

            <label for="vigencia">Inicio do Contrato:</label>
            <input type="date" id="vigencia" name="vigencia" onclick="this.showPicker()">

            <div class="linha-valores">
                <div class="campo-metade">
                    <label for="valorEquipamento">Valor por equipamento:</label>
                    <input type="text" id="valorEquipamento" name="valorEquipamento" placeholder="R$ 0,00">
                </div>

                <div class="campo-metade">
                    <label for="valorTotal">Valor Total:</label>
                    <input type="text" id="valorTotal" name="valorTotal" placeholder="R$ 0,00" readonly
                        class="campo-bloqueado">
                </div>
            </div>

            <div>
                <label for="desconto">O contrato terá Gratuidade ?</label>
                <input type="radio" id="gratuidadeSim" name="temGratuidade" value="Sim"> <label
                    for="gratuidadeSim">Sim</label>
                <input type="radio" id="gratuidadeNao" name="temGratuidade" value="Nao" checked> <label
                    for="gratuidadeNao">Não</label>
            </div>

            <div id="area-gratuidade" style="display: none;">

                <label for="gratuidade">Gratuidades:</label>
                <select name="gratuidade" id="gratuidade">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>

                <div class="grade-meses">
                    <div class="item-mes">
                        <input type="checkbox" id="mesJan" name="mesesDesconto" value="Janeiro">
                        <label for="mesJan">Janeiro</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesFev" name="mesesDesconto" value="Fevereiro">
                        <label for="mesFev">Fevereiro</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesMar" name="mesesDesconto" value="Marco">
                        <label for="mesMar">Março</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesAbr" name="mesesDesconto" value="Abril">
                        <label for="mesAbr">Abril</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesMai" name="mesesDesconto" value="Maio">
                        <label for="mesMai">Maio</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesJun" name="mesesDesconto" value="Junho">
                        <label for="mesJun">Junho</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesJul" name="mesesDesconto" value="Julho">
                        <label for="mesJul">Julho</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesAgo" name="mesesDesconto" value="Agosto">
                        <label for="mesAgo">Agosto</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesSet" name="mesesDesconto" value="Setembro">
                        <label for="mesSet">Setembro</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesOut" name="mesesDesconto" value="Outubro">
                        <label for="mesOut">Outubro</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesNov" name="mesesDesconto" value="Novembro">
                        <label for="mesNov">Novembro</label>
                    </div>
                    <div class="item-mes">
                        <input type="checkbox" id="mesDez" name="mesesDesconto" value="Dezembro">
                        <label for="mesDez">Dezembro</label>
                    </div>
                </div>
            </div>
        </div>
        <div id="button">
            <button type="button" id="btnGerar">Gerar Contrato</button>
        </div>
    </form>
    <script src="motor.js"></script>
</body>

</html>
